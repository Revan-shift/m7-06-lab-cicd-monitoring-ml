name: Deploy Vision Moderation Model

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}
  SHA_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint (OpenAPI + Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Install spectral for OpenAPI lint
        run: npm install -g @stoplight/spectral-cli@6

      - name: Lint OpenAPI spec
        run: spectral lint openapi.yaml --ruleset .spectral.yaml || spectral lint openapi.yaml

  test:
    name: Unit + Contract Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: bash ./scripts/test-unit.sh

      - name: Run contract tests
        run: bash ./scripts/test-contract.sh

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ env.IMAGE }}:${{ env.SHA_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE }}:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy scan — fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.SHA_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  push:
    name: Push Image to GHCR
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ${{ env.IMAGE }}:${{ env.SHA_TAG }}

      - name: Tag as latest
        run: |
          docker tag ${{ env.IMAGE }}:${{ env.SHA_TAG }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.vision-moderation.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          DEPLOY_ENV: staging
          IMAGE_TAG: ${{ env.SHA_TAG }}
        run: bash ./scripts/deploy.sh

  smoke-staging:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests against staging
        env:
          TARGET_ENV: staging
          IMAGE_TAG: ${{ env.SHA_TAG }}
        run: bash ./scripts/smoke.sh

  deploy-production:
    name: Deploy to Production (Canary → Full)
    runs-on: ubuntu-latest
    needs: smoke-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://vision-moderation.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Canary rollout — 10%
        env:
          DEPLOY_ENV: production
          IMAGE_TAG: ${{ env.SHA_TAG }}
          CANARY_WEIGHT: "10"
        run: bash ./scripts/deploy.sh

      - name: Verify canary health
        env:
          TARGET_ENV: production
          IMAGE_TAG: ${{ env.SHA_TAG }}
          CANARY_WEIGHT: "10"
        run: bash ./scripts/canary-verify.sh

      - name: Full rollout — 100%
        env:
          DEPLOY_ENV: production
          IMAGE_TAG: ${{ env.SHA_TAG }}
          CANARY_WEIGHT: "100"
        run: bash ./scripts/deploy.sh
